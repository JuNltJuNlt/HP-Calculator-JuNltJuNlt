<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="怪物血量计算器 - 正向计算与反推模式，支持V1/V2/V3类型，等级1-110，反推等级时自动匹配最接近值">
    <title>怪物血量计算器 | 正向 + 智能反推</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 820px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .main-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #000000;
            letter-spacing: -0.3px;
        }
        .subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e2f;
            font-family: monospace;
            background: #f8f8f8;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }
        .divider {
            width: 48px;
            border-top: 1px solid #eaeaea;
        }
        .mode-switch {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 0.5rem 0;
        }
        .mode-btn {
            background: transparent;
            border: 1px solid #aaaaaa;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            color: #2c3e2f;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background-color: #000000;
            border-color: #000000;
            color: #ffffff;
        }
        .panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 0.2rem;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.7rem;
        }
        .row-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e2a2e;
            min-width: 145px;
            text-align: left;
        }
        .row-label small {
            font-weight: normal;
            color: #5d6e6e;
            font-size: 0.7rem;
            margin-left: 4px;
        }
        .row-control {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
            justify-content: flex-end;
        }
        .type-group {
            display: flex;
            gap: 0.7rem;
        }
        .type-btn {
            background: transparent;
            border: 1px solid #aaaaaa;
            padding: 0.3rem 0.9rem;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            color: #2c3e2f;
            transition: all 0.2s;
        }
        .type-btn.active {
            background-color: #000000;
            border-color: #000000;
            color: #ffffff;
        }
        .num-input {
            width: 150px;
            padding: 0.45rem 0.7rem;
            font-size: 0.85rem;
            border: 1px solid #cccccc;
            border-radius: 12px;
            font-family: monospace;
            text-align: center;
            background: #fff;
        }
        .num-input:focus {
            outline: none;
            border-color: #000000;
        }
        .percent-wrapper {
            display: inline-flex;
            align-items: center;
            background: #fff;
            border: 1px solid #cccccc;
            border-radius: 12px;
            padding: 0 0 0 8px;
        }
        .percent-input {
            width: 110px;
            padding: 0.45rem 0.2rem;
            font-size: 0.85rem;
            border: none;
            background: transparent;
            font-family: monospace;
            text-align: right;
            outline: none;
        }
        .percent-symbol {
            font-size: 0.85rem;
            padding-right: 8px;
            color: #3a3a3a;
        }
        .percent-wrapper:focus-within {
            border-color: #000000;
        }
        .result-box {
            border: 2px solid #000000;
            background: transparent;
            padding: 1.4rem 2rem;
            min-width: 260px;
        }
        .hp-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #000000;
            word-break: break-word;
            line-height: 1.2;
        }
        .warning-text {
            font-size: 1rem;
            font-weight: 500;
            color: #c0392b;
        }
        .info-text {
            font-size: 0.9rem;
            color: #e67e22;
        }
        .level-hint {
            font-size: 0.68rem;
            background: #f5f5f5;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #5a626e;
        }
        .radio-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
        }
        .radio-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .inverse-result {
            margin-top: 0.5rem;
            padding: 0.8rem;
            background: #f9f9f9;
            border-radius: 16px;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e2f;
            border: 1px solid #e0e0e0;
        }
        .foldable-content {
            width: 100%;
            transition: all 0.3s ease;
        }
        .hidden {
            display: none;
        }
        .note {
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            margin-top: 0.5rem;
        }
        @media (max-width: 580px) {
            .row {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .row-control {
                justify-content: flex-start;
            }
            .row-label {
                min-width: auto;
            }
            .hp-number {
                font-size: 2rem;
            }
            .result-box {
                padding: 1rem;
                min-width: 200px;
            }
            .main-title {
                font-size: 2rem;
            }
            .num-input, .percent-input {
                width: 100%;
            }
            .percent-wrapper {
                width: 100%;
            }
            .radio-group {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-title">怪物血量计算</div>
    <div class="subtitle">怪物血量 = 等级基础血量 × 相对血量 × 环境血量系数</div>
    <div class="divider"></div>

    <div class="mode-switch">
        <button id="normalModeBtn" class="mode-btn active">正向计算模式</button>
        <button id="inverseModeBtn" class="mode-btn">反推模式</button>
    </div>

    <!-- 正向计算区域 -->
    <div id="normalPanel" class="foldable-content">
        <div class="result-box">
            <div class="hp-number" id="hpDisplay">—</div>
        </div>
        <div class="panel">
            <div class="row">
                <div class="row-label">怪物类型 <small>(V1/V2/V3)</small></div>
                <div class="row-control">
                    <div class="type-group" id="normalTypeGroup">
                        <button data-type="v1" class="type-btn active">V1</button>
                        <button data-type="v2" class="type-btn">V2</button>
                        <button data-type="v3" class="type-btn">V3</button>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="row-label">怪物等级 <small>(1 ~ 110)</small></div>
                <div class="row-control">
                    <input type="number" id="normalLevel" class="num-input" step="1" min="1" max="110" placeholder="1-110">
                    <div class="level-hint">支持等级 1 ~ 110</div>
                </div>
            </div>
            <div class="row">
                <div class="row-label">相对血量 C <small>(小数 ≥0)</small></div>
                <div class="row-control">
                    <input type="number" id="normalRel" class="num-input" step="0.01" placeholder="例: 1.85">
                </div>
            </div>
            <div class="row">
                <div class="row-label">环境血量系数 D <small>(百分数 %)</small></div>
                <div class="row-control">
                    <div class="percent-wrapper">
                        <input type="number" id="normalEnvPercent" class="percent-input" step="1" placeholder="例: 120">
                        <span class="percent-symbol">%</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="note">※ 相对血量填小数，环境系数填百分数，最终血量四舍五入取整。</div>
    </div>

    <!-- 反推计算区域（初始隐藏，动态隐藏待推算字段） -->
    <div id="inversePanel" class="foldable-content hidden">
        <div class="panel">
            <div class="row">
                <div class="row-label">怪物类型 <small>(V1/V2/V3)</small></div>
                <div class="row-control">
                    <div class="type-group" id="inverseTypeGroup">
                        <button data-type="v1" class="type-btn active">V1</button>
                        <button data-type="v2" class="type-btn">V2</button>
                        <button data-type="v3" class="type-btn">V3</button>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="row-label">需要反推的内容</div>
                <div class="row-control">
                    <div class="radio-group" id="inverseTargetGroup">
                        <label><input type="radio" name="inverseTarget" value="level" checked> 怪物等级</label>
                        <label><input type="radio" name="inverseTarget" value="rel"> 相对血量 C</label>
                        <label><input type="radio" name="inverseTarget" value="env"> 环境血量系数 D</label>
                    </div>
                </div>
            </div>
            <!-- 动态行：怪物等级 (仅在非反推等级时显示) -->
            <div class="row" id="inverseLevelRow">
                <div class="row-label">怪物等级 <small>(1~110)</small></div>
                <div class="row-control">
                    <input type="number" id="inverseLevel" class="num-input" step="1" min="1" max="110" placeholder="输入等级">
                </div>
            </div>
            <!-- 动态行：相对血量 (仅在非反推相对血量时显示) -->
            <div class="row" id="inverseRelRow">
                <div class="row-label">相对血量 C <small>(小数)</small></div>
                <div class="row-control">
                    <input type="number" id="inverseRel" class="num-input" step="0.01" placeholder="例: 1.85">
                </div>
            </div>
            <!-- 动态行：环境系数 (仅在非反推环境系数时显示) -->
            <div class="row" id="inverseEnvRow">
                <div class="row-label">环境血量系数 D <small>(百分数%)</small></div>
                <div class="row-control">
                    <div class="percent-wrapper">
                        <input type="number" id="inverseEnvPercent" class="percent-input" step="1" placeholder="例: 120">
                        <span class="percent-symbol">%</span>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="row-label">已知血量 A</div>
                <div class="row-control">
                    <input type="number" id="inverseHp" class="num-input" step="1" placeholder="请输入已知血量">
                </div>
            </div>
        </div>
        <div class="result-box" id="inverseResultBox">
            <div class="hp-number" id="inverseResultDisplay">—</div>
        </div>
        <div class="note">※ 选择需要反推的内容后，系统自动隐藏对应的输入框，填写其余三项已知数据即可得到结果。<br>
        反推等级时会自动匹配最接近的等级（1-110范围内精确计算）。</div>
    </div>
</div>

    const originalV2 = {

    const baseHpData = {};
    for (let lvl = 1; lvl <= 110; lvl++) {
        baseHpData[lvl] = { v1: originalV1V3[lvl].v1, v2: originalV2[lvl] * 2, v3: originalV1V3[lvl].v3 };
    }
    function getBaseHp(level, type) { return baseHpData[level]?.[type] ?? null; }

    // ==================== 正向计算 ====================
    const normalLevel = document.getElementById('normalLevel');
    const normalRel = document.getElementById('normalRel');
    const normalEnvPercent = document.getElementById('normalEnvPercent');
    const hpDisplay = document.getElementById('hpDisplay');
    let normalType = 'v1';
    function updateNormalUI() {
        const levelRaw = normalLevel.value.trim();
        if (levelRaw === '') { hpDisplay.innerHTML = '<span class="warning-text">请输入等级</span>'; return; }
        const level = parseInt(levelRaw);
        if (isNaN(level) || level < 1 || level > 110) { hpDisplay.innerHTML = '<span class="warning-text">等级需为1~110</span>'; return; }
        const base = getBaseHp(level, normalType);
        if (!base) { hpDisplay.innerHTML = '<span class="warning-text">无此等级数据</span>'; return; }
        const relRaw = normalRel.value.trim();
        if (relRaw === '') { hpDisplay.innerHTML = '<span class="info-text">请填写相对血量</span>'; return; }
        const rel = parseFloat(relRaw);
        if (isNaN(rel) || rel < 0) { hpDisplay.innerHTML = '<span class="info-text">相对血量需≥0的数字</span>'; return; }
        const envRaw = normalEnvPercent.value.trim();
        if (envRaw === '') { hpDisplay.innerHTML = '<span class="info-text">请填写环境系数</span>'; return; }
        const envPct = parseFloat(envRaw);
        if (isNaN(envPct) || envPct < 0) { hpDisplay.innerHTML = '<span class="info-text">环境系数需≥0的百分数</span>'; return; }
        const env = envPct / 100;
        const finalHp = Math.round(base * rel * env);
        hpDisplay.innerText = finalHp.toLocaleString();
    }
    document.querySelectorAll('#normalTypeGroup .type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#normalTypeGroup .type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            normalType = btn.dataset.type;
            updateNormalUI();
        });
    });
    [normalLevel, normalRel, normalEnvPercent].forEach(el => el.addEventListener('input', updateNormalUI));
    normalLevel.addEventListener('change', function() { let v = parseInt(this.value); if (!isNaN(v)) this.value = Math.min(110, Math.max(1, v)); updateNormalUI(); });

    // ==================== 反推模式逻辑（动态隐藏字段 + 智能等级匹配） ====================
    let inverseType = 'v1';
    let inverseTarget = 'level';
    const inverseLevelInput = document.getElementById('inverseLevel');
    const inverseRelInput = document.getElementById('inverseRel');
    const inverseEnvInput = document.getElementById('inverseEnvPercent');
    const inverseHpInput = document.getElementById('inverseHp');
    const inverseResultSpan = document.getElementById('inverseResultDisplay');
    const levelRow = document.getElementById('inverseLevelRow');
    const relRow = document.getElementById('inverseRelRow');
    const envRow = document.getElementById('inverseEnvRow');

    function updateFieldsVisibility() {
        if (inverseTarget === 'level') {
            levelRow.classList.add('hidden');
            relRow.classList.remove('hidden');
            envRow.classList.remove('hidden');
        } else if (inverseTarget === 'rel') {
            levelRow.classList.remove('hidden');
            relRow.classList.add('hidden');
            envRow.classList.remove('hidden');
        } else { // env
            levelRow.classList.remove('hidden');
            relRow.classList.remove('hidden');
            envRow.classList.add('hidden');
        }
    }

    function updateInverseUI() {
        const type = inverseType;
        const target = inverseTarget;
        const levelRaw = inverseLevelInput.value.trim();
        const relRaw = inverseRelInput.value.trim();
        const envRaw = inverseEnvInput.value.trim();
        const hpRaw = inverseHpInput.value.trim();
        const level = (target !== 'level' && levelRaw !== '') ? parseInt(levelRaw) : null;
        const rel = (target !== 'rel' && relRaw !== '') ? parseFloat(relRaw) : null;
        const envPct = (target !== 'env' && envRaw !== '') ? parseFloat(envRaw) : null;
        const env = envPct !== null ? envPct / 100 : null;
        const hp = hpRaw === '' ? null : parseFloat(hpRaw);
        if (target === 'level') {
            if (rel === null || env === null || hp === null) { inverseResultSpan.innerText = '请填写相对血量、环境系数和已知血量'; return; }
            if (rel <= 0 || env <= 0 || hp <= 0) { inverseResultSpan.innerText = '系数与血量需为正数'; return; }
            let bestLevel = null;
            let minDiff = Infinity;
            for (let lvl = 1; lvl <= 110; lvl++) {
                const base = getBaseHp(lvl, type);
                if (base) {
                    const calcHp = base * rel * env;
                    const diff = Math.abs(calcHp - hp);
                    if (diff < minDiff) {
                        minDiff = diff;
                        bestLevel = lvl;
                    }
                }
            }
            if (bestLevel !== null) {
                const bestBase = getBaseHp(bestLevel, type);
                const actualHp = bestBase * rel * env;
                inverseResultSpan.innerHTML = `推算最接近等级：${bestLevel}<br>(理论血量 ${Math.round(actualHp).toLocaleString()}，差异 ${Math.round(minDiff).toLocaleString()})`;
            } else {
                inverseResultSpan.innerText = '未找到匹配等级';
            }
        } else if (target === 'rel') {
            if (level === null || level < 1 || level > 110) { inverseResultSpan.innerText = '请填写有效的等级(1~110)'; return; }
            if (env === null || hp === null) { inverseResultSpan.innerText = '请填写环境系数和已知血量'; return; }
            if (env <= 0 || hp <= 0) { inverseResultSpan.innerText = '系数与血量需为正数'; return; }
            const base = getBaseHp(level, type);
            if (!base) { inverseResultSpan.innerText = '该等级无基础血量数据'; return; }
            const relCalc = hp / (base * env);
            if (relCalc < 0) inverseResultSpan.innerText = '计算结果为负数，请检查输入';
            else inverseResultSpan.innerText = `推算相对血量 C = ${relCalc.toFixed(6)}`;
        } else if (target === 'env') {
            if (level === null || level < 1 || level > 110) { inverseResultSpan.innerText = '请填写有效的等级(1~110)'; return; }
            if (rel === null || hp === null) { inverseResultSpan.innerText = '请填写相对血量和已知血量'; return; }
            if (rel <= 0 || hp <= 0) { inverseResultSpan.innerText = '血量与相对血量需为正数'; return; }
            const base = getBaseHp(level, type);
            if (!base) { inverseResultSpan.innerText = '该等级无基础血量数据'; return; }
            const envCalc = hp / (base * rel);
            if (envCalc < 0) inverseResultSpan.innerText = '计算结果为负数，请检查输入';
            else inverseResultSpan.innerText = `推算环境血量系数 D = ${(envCalc * 100).toFixed(4)}%`;
        }
    }

    // 监听类型切换
    document.querySelectorAll('#inverseTypeGroup .type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#inverseTypeGroup .type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            inverseType = btn.dataset.type;
            updateInverseUI();
        });
    });
    // 监听反推目标切换（同时更新显示/隐藏字段）
    document.querySelectorAll('input[name="inverseTarget"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            inverseTarget = e.target.value;
            updateFieldsVisibility();
            updateInverseUI();
        });
    });
    // 监听所有输入变化
    [inverseLevelInput, inverseRelInput, inverseEnvInput, inverseHpInput].forEach(el => el.addEventListener('input', updateInverseUI));

    // ==================== 模式切换 ====================
    const normalPanelDiv = document.getElementById('normalPanel');
    const inversePanelDiv = document.getElementById('inversePanel');
    const normalModeBtn = document.getElementById('normalModeBtn');
    const inverseModeBtn = document.getElementById('inverseModeBtn');
    function setMode(normalActive) {
        if (normalActive) {
            normalPanelDiv.classList.remove('hidden');
            inversePanelDiv.classList.add('hidden');
            normalModeBtn.classList.add('active');
            inverseModeBtn.classList.remove('active');
        } else {
            normalPanelDiv.classList.add('hidden');
            inversePanelDiv.classList.remove('hidden');
            normalModeBtn.classList.remove('active');
            inverseModeBtn.classList.add('active');
            updateFieldsVisibility();
            updateInverseUI();
        }
    }
    normalModeBtn.addEventListener('click', () => setMode(true));
    inverseModeBtn.addEventListener('click', () => setMode(false));
    updateNormalUI();
    updateFieldsVisibility();
</script>
</body>
</html>
