<html lang="zh-CN">

        .main-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #000000;
        }

            font-family: monospace;
            background: #f8f8f8;
            padding: 0.2rem 1rem;

            gap: 1rem;
            justify-content: center;

        }
        .game-btn {

            border: 1px solid #aaaaaa;
            padding: 0.4rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #2c3e2f;

        }
        .game-btn.active {
            background-color: #000000;
            border-color: #000000;
            color: #ffffff;
        }
        .mode-switch {

            align-items: center;

            border-color: #000000;
            color: #ffffff;
        }
        .panel {

            flex-direction: column;
            gap: 1rem;
            margin-top: 0.2rem;
        }
        .row {

            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.6rem;

            font-weight: 600;
            color: #1e2a2e;
            min-width: 150px;

        }

            color: #5d6e6e;
            font-size: 0.7rem;
            margin-left: 4px;

            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
            justify-content: flex-end;
        }
        .type-group {
            display: flex;
            gap: 0.7rem;
        }
        .type-btn {
            background: transparent;
            border: 1px solid #aaaaaa;
            padding: 0.25rem 0.9rem;
            font-size: 0.8rem;
            border-radius: 30px;
            cursor: pointer;
            color: #2c3e2f;

        .type-btn.active {
            background-color: #000000;
            border-color: #000000;
            color: #ffffff;
        }
        .num-input {

            padding: 0.4rem 0.7rem;
            font-size: 0.85rem;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-family: monospace;
            text-align: center;
        }
        .num-input:focus {
            outline: none;
            border-color: #000;
        }
        .percent-wrapper {
            display: inline-flex;
            align-items: center;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 0 0 0 8px;
        }
        .percent-input {
            width: 110px;
            padding: 0.4rem 0.2rem;
            font-size: 0.85rem;
            border: none;
            background: transparent;
            font-family: monospace;
            text-align: right;
            outline: none;
        }
        .percent-symbol {
            font-size: 0.85rem;
            padding-right: 8px;
            color: #3a3a3a;
        }
        .result-box {
            border: 2px solid #000000;
            background: transparent;
            padding: 1rem 1.5rem;
            min-width: 240px;
        }
        .hp-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: #000;
            word-break: break-word;
        }
        .warning-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: #c0392b;
        }
        .info-text {
            font-size: 0.85rem;
            color: #e67e22;
        }
        .level-hint {
            font-size: 0.68rem;
            background: #f5f5f5;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #5a626e;
        }
        .radio-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .radio-group label {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }
        .foldable-content {
            width: 100%;
        }
        .hidden {
            display: none;
        }
        .note {
            font-size: 0.68rem;
            color: #888;
            text-align: center;
            margin-top: 0.5rem;
        }
        @media (max-width: 600px) {
            .row { flex-direction: column; align-items: stretch; }
            .row-control { justify-content: flex-start; }
            .row-label { min-width: auto; }
            .num-input, .percent-input { width: 100%; }
            .percent-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-title">游戏血量计算工具</div>
    <div class="subtitle">怪物血量 = 等级基础血量 × 相对血量 × 环境血量系数</div>

    <div class="game-selector">

    <div id="normalPanel" class="foldable-content"></div>
    <div id="inversePanel" class="foldable-content hidden"></div>

    <div class="note">※ 相对血量填小数，环境系数填百分数，最终血量四舍五入取整。反推等级时自动匹配最接近等级。<br>星穹铁道反推模式：请先选择「常规/混沌回忆」，再指定需要反推的变量。</div>
</div>

    function getStarRailBase(level, type) {
        if (type === 'normal') {
            if (level <= 70) return starCommonBase[level] || 0;
            if (level <= 100) return starRegular71_100[level] || 0;
            return 0;
        } else {
            if (level <= 70) return starCommonBase[level] || 0;
            if (level <= 100) return starChaos71_100[level] || 0;
            if (level === 120) return 180305.000664104;
            return 0;
        }
    }

    // 全局状态
    let currentGame = 'genshin';
    let currentStarRailSubType = 'normal';
    let isNormalMode = true;
    let inverseTarget = 'level';

    function getMaxLevel() {
        if (currentGame === 'genshin') return 110;
        if (currentStarRailSubType === 'chaos') return 120;
        return 100;
    }
    function getBaseHp(level, type) {
        if (currentGame === 'genshin') return getGenshinBase(level, type);
        return getStarRailBase(level, type);
    }

    // 更新游戏切换按钮的样式（独立函数，确保高亮正确）
    function updateGameButtonsStyle() {
        const genshinBtn = document.getElementById('gameGenshinBtn');
        const starRailBtn = document.getElementById('gameStarRailBtn');
        if (currentGame === 'genshin') {
            genshinBtn.classList.add('active');
            starRailBtn.classList.remove('active');
        } else {
            genshinBtn.classList.remove('active');
            starRailBtn.classList.add('active');
        }
    }

    function renderPanels() {
        const normalContainer = document.getElementById('normalPanel');
        const inverseContainer = document.getElementById('inversePanel');
        // 正向面板
        let normalTypeHtml = '';
        if (currentGame === 'genshin') {

            normalTypeHtml = `<button data-type="normal" class="type-btn ${currentStarRailSubType === 'normal' ? 'active' : ''}">常规</button><button data-type="chaos" class="type-btn ${currentStarRailSubType === 'chaos' ? 'active' : ''}">混沌回忆</button>`;

            <div class="panel">
                <div class="row"><div class="row-label">怪物类型 <small>${currentGame === 'genshin' ? '(V1/V2/V3)' : '常规 / 混沌回忆'}</small></div>

        }

    // 正向逻辑
    function updateNormalUI() {
        const level = parseInt(document.getElementById('normalLevel')?.value);
        const rel = parseFloat(document.getElementById('normalRel')?.value);
        const envPct = parseFloat(document.getElementById('normalEnvPercent')?.value);
        const hpSpan = document.getElementById('hpDisplay');
        if (!hpSpan) return;
        if (isNaN(level) || level < 1 || level > getMaxLevel()) { hpSpan.innerHTML = '<span class="warning-text">等级范围错误</span>'; return; }
        let type = document.querySelector('#normalTypeGroup .type-btn.active')?.dataset.type;
        if (!type) return;
        const base = getBaseHp(level, type);
        if (!base || base === 0) { hpSpan.innerHTML = '<span class="warning-text">无该等级数据</span>'; return; }
        if (isNaN(rel)) { hpSpan.innerHTML = '<span class="info-text">请填相对血量</span>'; return; }
        if (isNaN(envPct)) { hpSpan.innerHTML = '<span class="info-text">请填环境系数</span>'; return; }
        if (rel < 0 || envPct < 0) { hpSpan.innerHTML = '<span class="warning-text">数值须≥0</span>'; return; }
        const finalHp = Math.round(base * rel * (envPct / 100));
        hpSpan.innerText = finalHp.toLocaleString();
    }

    // 反推逻辑 (完全独立，基于当前反推面板的类型选择)
    function updateInverseUI() {
        const target = document.querySelector('input[name="inverseTarget"]:checked')?.value || 'level';
        const type = document.querySelector('#inverseTypeGroup .type-btn.active')?.dataset.type;
        const resultSpan = document.getElementById('inverseResultDisplay');
        if (!resultSpan || !type) return;
        const levelVal = document.getElementById('inverseLevel')?.value;
        const relVal = document.getElementById('inverseRel')?.value;
        const envPctVal = document.getElementById('inverseEnvPercent')?.value;
        const hpVal = document.getElementById('inverseHp')?.value;
        if (target === 'level') {
            const rel = parseFloat(relVal); const envPct = parseFloat(envPctVal); const hp = parseFloat(hpVal);
            if (isNaN(rel) || isNaN(envPct) || isNaN(hp)) { resultSpan.innerText = '请填写相对血量、环境系数和已知血量'; return; }
            if (rel <= 0 || envPct <= 0 || hp <= 0) { resultSpan.innerText = '数值需为正数'; return; }
            let bestLevel = null, minDiff = Infinity;
            for (let lvl = 1; lvl <= getMaxLevel(); lvl++) {
                const base = getBaseHp(lvl, type);
                if (base) { const calc = base * rel * (envPct / 100); const diff = Math.abs(calc - hp); if (diff < minDiff) { minDiff = diff; bestLevel = lvl; } }
            }
            if (bestLevel) resultSpan.innerText = `最接近等级：${bestLevel} (误差≈${Math.round(minDiff).toLocaleString()})`;
            else resultSpan.innerText = '未找到匹配等级';
        } else if (target === 'rel') {
            const lvl = parseInt(levelVal); const envPct = parseFloat(envPctVal); const hp = parseFloat(hpVal);
            if (isNaN(lvl) || lvl < 1 || lvl > getMaxLevel()) { resultSpan.innerText = '有效等级必填'; return; }
            if (isNaN(envPct) || isNaN(hp) || envPct <= 0 || hp <= 0) { resultSpan.innerText = '环境系数/血量需为正数'; return; }
            const base = getBaseHp(lvl, type);
            if (!base) { resultSpan.innerText = '无基础血量'; return; }
            const rel = hp / (base * (envPct / 100));
            resultSpan.innerText = `相对血量 C = ${rel.toFixed(6)}`;
        } else {
            const lvl = parseInt(levelVal); const rel = parseFloat(relVal); const hp = parseFloat(hpVal);
            if (isNaN(lvl) || lvl < 1 || lvl > getMaxLevel()) { resultSpan.innerText = '有效等级必填'; return; }
            if (isNaN(rel) || isNaN(hp) || rel <= 0 || hp <= 0) { resultSpan.innerText = '相对血量/血量需为正数'; return; }
            const base = getBaseHp(lvl, type);
            if (!base) { resultSpan.innerText = '无基础血量'; return; }
            const envDec = hp / (base * rel);
            resultSpan.innerText = `环境系数 D = ${(envDec * 100).toFixed(4)}%`;
        }
    }

    function updateFieldVisibility() {
        const target = document.querySelector('input[name="inverseTarget"]:checked')?.value || 'level';
        const levelRow = document.getElementById('invLevelRow');
        const relRow = document.getElementById('invRelRow');
        const envRow = document.getElementById('invEnvRow');
        if (!levelRow) return;
        if (target === 'level') { levelRow.style.display = 'none'; relRow.style.display = 'flex'; envRow.style.display = 'flex'; }
        else if (target === 'rel') { levelRow.style.display = 'flex'; relRow.style.display = 'none'; envRow.style.display = 'flex'; }
        else { levelRow.style.display = 'flex'; relRow.style.display = 'flex'; envRow.style.display = 'none'; }
    }

    // 事件绑定 (正向)
    function bindNormalEvents() {
        const normalTypeBtns = document.querySelectorAll('#normalTypeGroup .type-btn');
        normalTypeBtns.forEach(btn => {
            btn.removeEventListener('click', normalTypeHandler);
            btn.addEventListener('click', normalTypeHandler);
        });
        const levelInp = document.getElementById('normalLevel');
        const relInp = document.getElementById('normalRel');
        const envInp = document.getElementById('normalEnvPercent');
        if(levelInp) levelInp.addEventListener('input', updateNormalUI);
        if(relInp) relInp.addEventListener('input', updateNormalUI);
        if(envInp) envInp.addEventListener('input', updateNormalUI);
        if(levelInp) levelInp.addEventListener('change', function() { let v = parseInt(this.value); if(!isNaN(v)) this.value = Math.min(getMaxLevel(), Math.max(1, v)); updateNormalUI(); });
    }
    function normalTypeHandler(e) {
        const btn = e.currentTarget;
        const group = btn.parentElement;
        group.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (currentGame === 'starrail') {
            const newSub = btn.dataset.type;
            if (newSub === 'normal' || newSub === 'chaos') {
                currentStarRailSubType = newSub;
                renderPanels();  // 刷新整个界面以同步最大等级和按钮状态
                return;
            }
        }
        updateNormalUI();
    }

    // 反推事件绑定 (独立)
    function bindInverseEvents() {
        const invTypeBtns = document.querySelectorAll('#inverseTypeGroup .type-btn');
        invTypeBtns.forEach(btn => {
            btn.removeEventListener('click', inverseTypeHandler);
            btn.addEventListener('click', inverseTypeHandler);
        });
        const radios = document.querySelectorAll('input[name="inverseTarget"]');
        radios.forEach(radio => radio.addEventListener('change', () => { updateFieldVisibility(); updateInverseUI(); }));
        const inputs = ['inverseLevel','inverseRel','inverseEnvPercent','inverseHp'];
        inputs.forEach(id => { const el = document.getElementById(id); if(el) el.addEventListener('input', updateInverseUI); });
    }
    function inverseTypeHandler(e) {
        const btn = e.currentTarget;
        const group = btn.parentElement;
        group.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (currentGame === 'starrail') {
            const newSub = btn.dataset.type;
            if (newSub === 'normal' || newSub === 'chaos') {
                currentStarRailSubType = newSub;
                renderPanels();  // 完全重绘，保证反推面板中的类型与全局同步
                return;
            }
        }
        updateInverseUI();
    }

    // 切换游戏 (同时更新按钮样式)
    function switchGame(game) {
        currentGame = game;
        if (game === 'starrail') currentStarRailSubType = 'normal';
        isNormalMode = true;
        // 更新游戏按钮高亮
        updateGameButtonsStyle();
        // 重置模式按钮样式
        document.getElementById('normalModeBtn').classList.add('active');
        document.getElementById('inverseModeBtn').classList.remove('active');
        document.getElementById('inversePanel').classList.add('hidden');
        document.getElementById('normalPanel').classList.remove('hidden');
        renderPanels();
    }
    function setMode(normal) {
        isNormalMode = normal;
        const normalDiv = document.getElementById('normalPanel');
        const inverseDiv = document.getElementById('inversePanel');
        if (normal) {
            normalDiv.classList.remove('hidden');
            inverseDiv.classList.add('hidden');
            document.getElementById('normalModeBtn').classList.add('active');
            document.getElementById('inverseModeBtn').classList.remove('active');
            updateNormalUI();
        } else {
            normalDiv.classList.add('hidden');
            inverseDiv.classList.remove('hidden');
            document.getElementById('normalModeBtn').classList.remove('active');
            document.getElementById('inverseModeBtn').classList.add('active');
            updateFieldVisibility();
            updateInverseUI();
        }
    }

    // 初始化事件与样式
    document.getElementById('gameGenshinBtn').addEventListener('click', () => switchGame('genshin'));
    document.getElementById('gameStarRailBtn').addEventListener('click', () => switchGame('starrail'));
    document.getElementById('normalModeBtn').addEventListener('click', () => setMode(true));
    document.getElementById('inverseModeBtn').addEventListener('click', () => setMode(false));
    
    // 初始渲染
    updateGameButtonsStyle();
    renderPanels();
</script>
</body>
</html>
